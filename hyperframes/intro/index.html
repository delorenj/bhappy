<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>BHappy — Hero Intro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" />
  <style>
    :root {
      --canvas: #FFF6E8;
      --canvas-deep: #FBE9CF;
      --peach: #FFE0B8;
      --peach-deep: #FFC78A;
      --ink: #15172E;
      --ink-soft: #2B2F50;
      --ink-muted: #5A6188;
      --amber: #F59410;
      --amber-soft: #FFB04E;
      --amber-deep: #D87208;
      --coral: #FF8A6B;
      --rose: #EF5B4A;
      --plum: #6E3FCF;
    }

    html, body { margin: 0; padding: 0; background: var(--canvas); }
    body { font-family: 'Outfit', system-ui, sans-serif; color: var(--ink); }

    #bhappy-intro {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--canvas);
    }

    /* Sun-rise gradient wash, anchored bottom */
    .bg-wash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(70rem 50rem at 50% 110%, rgba(245,148,16,0.32) 0%, transparent 60%),
        radial-gradient(50rem 40rem at 100% 0%, rgba(255,138,107,0.18) 0%, transparent 65%),
        radial-gradient(40rem 36rem at 0% 100%, rgba(110,63,207,0.10) 0%, transparent 60%);
      opacity: 0;
    }

    /* Subtle grain (data URI noise) */
    .bg-grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: multiply;
      opacity: 0.35;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.09  0 0 0 0 0.18  0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* Oversized faded ghost type behind */
    .ghost-type {
      position: absolute;
      left: -120px;
      bottom: -180px;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 720px;
      letter-spacing: -0.06em;
      line-height: 0.85;
      color: var(--amber);
      opacity: 0;
      mix-blend-mode: multiply;
      pointer-events: none;
      white-space: nowrap;
    }

    .scene-content {
      position: relative;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    /* === Sun (gradient circle) === */
    .sun {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #FFE6B5 0%, var(--amber-soft) 30%, var(--amber) 60%, var(--amber-deep) 100%);
      box-shadow:
        0 0 0 24px rgba(245,148,16,0.10),
        0 0 0 60px rgba(245,148,16,0.06),
        0 40px 120px -20px rgba(245,148,16,0.55);
      left: 780px;
      top: 200px;
      opacity: 0;
      transform-origin: center;
    }

    .sun-glint {
      position: absolute;
      inset: 22% 26% auto auto;
      width: 70px;
      height: 70px;
      background: rgba(255,255,255,0.55);
      border-radius: 50%;
      filter: blur(12px);
    }

    /* === Wordmark scene 1 === */
    .wordmark {
      position: absolute;
      left: 0;
      right: 0;
      top: 640px;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 168px;
      letter-spacing: -0.04em;
      color: var(--ink);
      line-height: 1;
      opacity: 0;
    }

    .eyebrow-1 {
      position: absolute;
      left: 0;
      right: 0;
      top: 840px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 32px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--ink-muted);
      opacity: 0;
    }

    /* === Scene 2: corner sun + headline + tier cards === */
    .corner-sun {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #FFE6B5 0%, var(--amber-soft) 30%, var(--amber) 60%, var(--amber-deep) 100%);
      box-shadow: 0 0 0 18px rgba(245,148,16,0.10), 0 30px 80px -16px rgba(245,148,16,0.5);
      right: 100px;
      top: 80px;
      opacity: 0;
    }

    .headline {
      position: absolute;
      left: 120px;
      right: 380px;
      top: 380px;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 156px;
      letter-spacing: -0.045em;
      color: var(--ink);
      line-height: 0.95;
      opacity: 0;
    }

    .headline-pill {
      display: inline-block;
      padding: 0.18em 0.36em 0.22em;
      background: var(--amber);
      color: var(--ink);
      border-radius: 9999px;
      box-shadow: 0 24px 50px -16px rgba(245,148,16,0.6);
      vertical-align: 0.04em;
      font-size: 0.78em;
      line-height: 1;
      margin: 0 0.04em;
    }

    .tier-row {
      position: absolute;
      left: 120px;
      right: 120px;
      top: 720px;
      display: flex;
      gap: 28px;
      align-items: stretch;
    }

    .tier-card {
      flex: 1;
      background: #FFFFFF;
      border-radius: 28px;
      padding: 36px 32px 32px;
      position: relative;
      box-shadow: 0 24px 60px -22px rgba(245,148,16,0.32), 0 4px 12px -4px rgba(21,23,46,0.10);
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
    }

    .tier-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      background: var(--accent);
    }

    .tier-card .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .tier-card .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 56px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 0;
      line-height: 1;
    }

    .tier-card .glyph {
      position: absolute;
      top: 28px;
      right: 28px;
      width: 48px;
      height: 48px;
      color: var(--accent);
    }

    .tier-card-1 { --accent: var(--amber); }
    .tier-card-2 { --accent: var(--coral); }
    .tier-card-3 { --accent: var(--rose); }
    .tier-card-4 { --accent: var(--plum); }

    /* === Scene 3: CTA === */
    .cta-wrap {
      position: absolute;
      left: 0;
      right: 0;
      top: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      opacity: 0;
    }

    .cta-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--ink-muted);
    }

    .cta-pill {
      padding: 36px 80px;
      background: linear-gradient(180deg, #FFB04E 0%, var(--amber) 60%, var(--amber-deep) 100%);
      color: var(--ink);
      border-radius: 9999px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 84px;
      letter-spacing: -0.02em;
      box-shadow:
        inset 0 2px 0 0 rgba(255,255,255,0.5),
        0 30px 80px -18px rgba(245,148,16,0.65);
      display: inline-flex;
      align-items: center;
      gap: 32px;
    }

    .cta-pill .arrow {
      width: 64px;
      height: 64px;
      stroke: var(--ink);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .cta-sub {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 36px;
      color: var(--ink-muted);
    }

    /* Decorative dotted arc */
    .arc {
      position: absolute;
      width: 1100px;
      height: 1100px;
      border-radius: 50%;
      border: 2px dashed rgba(21,23,46,0.10);
      top: 200px;
      left: 410px;
      opacity: 0;
    }

    /* Foreground accent: bottom-left meta line */
    .meta-line {
      position: absolute;
      left: 120px;
      bottom: 80px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      opacity: 0;
    }
    .meta-line .bar {
      width: 80px;
      height: 2px;
      background: var(--amber);
    }

    /* tier-card-N override accent vars on the actual element */
  </style>
</head>
<body>
  <div id="bhappy-intro" data-composition-id="bhappy-intro" data-start="0" data-duration="8.5" data-width="1920" data-height="1080">
    <div class="scene-content">
      <div class="bg-wash"></div>
      <div class="bg-grain"></div>
      <div class="ghost-type">BMAD</div>
      <div class="arc"></div>

      <div class="sun"><div class="sun-glint"></div></div>
      <div class="corner-sun"></div>

      <div class="wordmark">BHappy</div>
      <div class="eyebrow-1">A BMAD Bootcamp</div>

      <h1 class="headline">Get fluent in <span class="headline-pill">BMAD</span>.</h1>

      <div class="tier-row" data-layout-allow-overflow>
        <div class="tier-card tier-card-1">
          <div class="num">Tier 01</div>
          <h3 class="title">Orient</h3>
          <svg class="glyph" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="26" stroke="currentColor" stroke-opacity="0.25" stroke-width="3" />
            <path d="M32 14 L36 32 L32 50 L28 32 Z" fill="currentColor" />
            <circle cx="32" cy="32" r="4" fill="#FFFFFF" stroke="currentColor" stroke-width="3" />
          </svg>
        </div>
        <div class="tier-card tier-card-2">
          <div class="num">Tier 02</div>
          <h3 class="title">Operate</h3>
          <svg class="glyph" viewBox="0 0 64 64" fill="none">
            <circle cx="14" cy="14" r="6" fill="currentColor" />
            <circle cx="50" cy="14" r="6" fill="currentColor" fill-opacity="0.7" />
            <circle cx="50" cy="50" r="6" fill="currentColor" fill-opacity="0.45" />
            <circle cx="14" cy="50" r="6" fill="currentColor" fill-opacity="0.25" />
          </svg>
        </div>
        <div class="tier-card tier-card-3">
          <div class="num">Tier 03</div>
          <h3 class="title">Extend</h3>
          <svg class="glyph" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="20" r="9" fill="currentColor" />
            <circle cx="18" cy="44" r="7" fill="currentColor" fill-opacity="0.55" />
            <circle cx="46" cy="44" r="7" fill="currentColor" fill-opacity="0.4" />
            <path d="M32 29 L18 37 M32 29 L46 37" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          </svg>
        </div>
        <div class="tier-card tier-card-4">
          <div class="num">Tier 04</div>
          <h3 class="title">Author</h3>
          <svg class="glyph" viewBox="0 0 64 64" fill="none">
            <rect x="10" y="14" width="44" height="36" rx="6" stroke="currentColor" stroke-width="3" />
            <circle cx="48" cy="44" r="8" fill="currentColor" />
          </svg>
        </div>
      </div>

      <div class="cta-wrap">
        <div class="cta-eyebrow">Your move</div>
        <div class="cta-pill">
          Start at Tier 01
          <svg class="arrow" viewBox="0 0 24 24">
            <path d="M5 12 H19 M13 6 L19 12 L13 18" />
          </svg>
        </div>
        <div class="cta-sub">bhappy — a BMAD bootcamp</div>
      </div>

      <div class="meta-line">
        <span class="bar"></span>
        <span>04 tiers · self-attest · made with bmad</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ===== SCENE 1: Sun rises (0–2.6s) =====
      tl.fromTo(".bg-wash", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "sine.out" }, 0.0);
      tl.fromTo(".bg-grain", { opacity: 0 }, { opacity: 0.35, duration: 0.4, ease: "sine.out" }, 0.05);

      // Ghost type slowly rises in the background
      tl.fromTo(".ghost-type", { opacity: 0, y: 60, scale: 0.96 },
        { opacity: 0.10, y: 0, scale: 1, duration: 1.6, ease: "expo.out" }, 0.3);

      // Sun rises from below frame
      tl.fromTo(".sun",
        { opacity: 0, y: 380, scale: 0.55 },
        { opacity: 1, y: 0, scale: 1, duration: 1.4, ease: "expo.out" }, 0.25);

      // Wordmark slides up from below sun
      tl.fromTo(".wordmark",
        { opacity: 0, y: 60, letterSpacing: "0.05em" },
        { opacity: 1, y: 0, letterSpacing: "-0.04em", duration: 0.9, ease: "power3.out" }, 1.0);

      // Eyebrow fades in last
      tl.fromTo(".eyebrow-1",
        { opacity: 0, letterSpacing: "0.5em" },
        { opacity: 1, letterSpacing: "0.32em", duration: 0.7, ease: "power2.out" }, 1.4);

      // Subtle ambient: sun glint pulses (seekable, attached to tl)
      tl.to(".sun-glint",
        { opacity: 0.85, scale: 1.2, duration: 1.2, yoyo: true, repeat: 3, ease: "sine.inOut" }, 1.6);

      // ===== TRANSITION 1 → 2 (2.4–2.9s): sun migrates to corner; scene 1 text fades =====
      // Sun shrinks + flies to top-right (continuous, not exit)
      tl.to(".sun", { x: 720, y: -280, scale: 0.45, opacity: 0, duration: 0.7, ease: "power3.inOut" }, 2.4);
      tl.to(".wordmark", { opacity: 0, scale: 0.92, y: -30, duration: 0.5, ease: "power2.inOut" }, 2.4);
      tl.to(".eyebrow-1", { opacity: 0, y: -20, duration: 0.4, ease: "power2.inOut" }, 2.4);
      tl.to(".ghost-type", { opacity: 0.05, x: -60, duration: 0.7, ease: "power2.inOut" }, 2.4);

      // Corner sun arrives (the "same" sun reborn smaller)
      tl.fromTo(".corner-sun",
        { opacity: 0, x: -160, y: 60, scale: 0.6, rotation: -25 },
        { opacity: 1, x: 0, y: 0, scale: 1, rotation: 0, duration: 0.8, ease: "expo.out" }, 2.6);

      // Decorative arc rotates in
      tl.fromTo(".arc",
        { opacity: 0, scale: 0.8, rotation: -30 },
        { opacity: 1, scale: 1, rotation: 0, duration: 1.2, ease: "expo.out" }, 2.7);

      // ===== SCENE 2: Headline + tier cards (2.9–5.7s) =====
      // Headline drops in
      tl.fromTo(".headline",
        { opacity: 0, y: 80, scale: 0.96 },
        { opacity: 1, y: 0, scale: 1, duration: 0.85, ease: "expo.out" }, 2.95);

      // Tier cards cascade — alternating direction, varied eases
      tl.fromTo(".tier-card-1",
        { opacity: 0, x: -240, y: 40, scale: 0.92 },
        { opacity: 1, x: 0, y: 0, scale: 1, duration: 0.7, ease: "power3.out" }, 3.55);
      tl.fromTo(".tier-card-2",
        { opacity: 0, x: -160, y: 60, scale: 0.92 },
        { opacity: 1, x: 0, y: 0, scale: 1, duration: 0.7, ease: "back.out(1.4)" }, 3.7);
      tl.fromTo(".tier-card-3",
        { opacity: 0, x: 160, y: 60, scale: 0.92 },
        { opacity: 1, x: 0, y: 0, scale: 1, duration: 0.7, ease: "power3.out" }, 3.85);
      tl.fromTo(".tier-card-4",
        { opacity: 0, x: 240, y: 40, scale: 0.92 },
        { opacity: 1, x: 0, y: 0, scale: 1, duration: 0.7, ease: "back.out(1.4)" }, 4.0);

      // Meta line types in
      tl.fromTo(".meta-line",
        { opacity: 0, x: -40 },
        { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" }, 4.2);

      // Cards breathe (subtle ambient)
      tl.to(".tier-card", {
        y: -6, duration: 0.9, yoyo: true, repeat: 1, ease: "sine.inOut", stagger: 0.06
      }, 4.6);

      // Corner sun gentle drift (after entrance settles)
      tl.to(".corner-sun", { rotation: 8, duration: 2.0, yoyo: true, repeat: 1, ease: "sine.inOut" }, 3.6);

      // ===== TRANSITION 2 → 3 (5.7–6.0s): cards lift + fade, headline morphs out =====
      tl.to(".headline", { opacity: 0, y: -60, scale: 0.96, duration: 0.5, ease: "power3.in" }, 5.7);
      tl.to(".tier-card", {
        opacity: 0, y: -30, scale: 0.94, duration: 0.5, ease: "power2.in",
        stagger: 0.04, overwrite: "auto"
      }, 5.7);
      tl.to(".meta-line", { opacity: 0, x: -40, duration: 0.4, ease: "power2.in" }, 5.7);

      // ===== SCENE 3: CTA (6.0–8.4s) =====
      tl.fromTo(".cta-wrap",
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 6.05);

      tl.fromTo(".cta-eyebrow",
        { opacity: 0, letterSpacing: "0.6em" },
        { opacity: 1, letterSpacing: "0.36em", duration: 0.6, ease: "power2.out" }, 6.1);

      tl.fromTo(".cta-pill",
        { opacity: 0, scale: 0.7, y: 80 },
        { opacity: 1, scale: 1, y: 0, duration: 0.85, ease: "back.out(1.6)" }, 6.25);

      tl.fromTo(".cta-sub",
        { opacity: 0, y: 30 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 6.7);

      // Pill subtle pulse
      tl.to(".cta-pill", { scale: 1.04, duration: 0.7, yoyo: true, repeat: 1, ease: "sine.inOut" }, 7.1);

      // Final sun pulse
      tl.to(".corner-sun", { scale: 1.18, duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut" }, 7.0);

      // Final fade-out (only the LAST scene gets exit animations, per the rules)
      tl.to([".cta-wrap", ".corner-sun", ".arc", ".bg-wash", ".bg-grain", ".ghost-type"],
        { opacity: 0, duration: 0.4, ease: "power2.in" }, 8.0);

      window.__timelines["bhappy-intro"] = tl;
    </script>
  </div>
</body>
</html>
